<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#183b56">
    <title>Scotland Driving Companion</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Offline Scotland guide</p>
        <h1>Dad's Driving Companion</h1>
      </div>
      <button id="installButton" class="small-button" hidden>Install</button>
    </header>

    <main id="app" class="app-shell">
      <section class="loading-card">
        <h2>Loading trip guide...</h2>
        <p>The guide works offline after the first successful load.</p>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Day navigation">
      <button id="prevDay" class="nav-button">Previous day</button>
      <button id="todayDay" class="nav-button primary">Today</button>
      <button id="nextDay" class="nav-button">Next day</button>
    </nav>

    <script src="app.js" defer></script>
  </body>
</html>
